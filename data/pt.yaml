    descriptions:
      default: |
        <p>
            Loja de peças e oficina de vans Sprinter. Contratado para projetar ferramentas para automatizar processos internos.
        </p>
        <ul>
            <li><b>Conduzi todo o ciclo de vida do produto solo</b> — desde entrevistas com stakeholders e descoberta de problemas até design, desenvolvimento e deploy.</li>
            <li>Automatizei workflows <b>eliminando mais de uma hora de trabalho repetitivo diário</b>.</li>
            <li>Projetei <b>para usuários não técnicos</b>, permitindo que donos do negócio configurassem automações sem suporte de engenharia.</li>
        </ul>

  cityshoppe:
    company: "CityShoppe"
    date: "Junho 2021 - Maio 2023 "
    location: "Austin-TX, US (Remoto)"
    titles:
      swe: "Engenheiro de Software Full Stack"
      pm: "Engenheiro Full Stack com Responsabilidades de Product Owner"
    descriptions:
      swe: |
        <p>
            CityShoppe é um marketplace para pequenos negócios nos EUA e
            Europa.
            Sendo a segunda pessoa no time eu era responsável por entender por
            completo o negócio e as tecnologias envolvidas, assim como <b>participar
            de todas as decisões de desenvolvimento e na resolução de problemas</b>.
            Eu também <b>participei ativamente na criação e desenvolvimento de
            todos os produtos da empresa</b>, desenvolvendo funcionalidades
            fundamentais e organizando a infraestrutura para garantir um sistema
            confiável e disponível. Esses esforços resultaram em mais de <b>200 mil
            dólares em investimento</b> para a empresa.
            <br/>
            Além disso,
            <ul>
                <li><b>Trabalhei com pessoas de 4 países diferentes no mesmo projeto</b>, desenvolvendo minhas habilidades de comunicação.</li>
                <li>Desenvolvi produtos em NodeJS, NestJS and PHP, usando serviços AWS (lambda, API gateway, ECS, EC2, etc) para infraestrutura.</li>
            </ul>
        </p>
      pm: |
        <p>
            Startup de marketplace digital (mercados dos EUA e UE). Membro inicial do time responsável por decisões técnicas
            e evolução do produto.
        </p>
        <ul>
            <li>Atuei como <b>parceiro técnico em decisões de produto e planejamento de arquitetura</b>.</li>
            <li>Ajudei na transição da plataforma de WordPress para uma arquitetura escalável em NestJS.</li>
            <li>Colaborei com <b>stakeholders e time cross-country em 4 países</b>.</li>
            <li>Contribuí para a confiabilidade da infraestrutura, apoiando os esforços de captação de investimento (>$200k captados).</li>
        </ul>

  educando:
    company: '<a href="https://educandoseubolso.blog.br">Educando Seu Bolso (https://educandoseubolso.blog.br)</a>'
    date: "Ago 2017 – Jan 2019 / Ago 2019 - Jun 2020"
    location: "BH-MG, Brasil"
    titles:
      default: "Engenheiro de Software Full Stack"
    descriptions:
      swe: |
        <p>
        Edutech financeira que conecta pessoas e empresas através de cursos,
        podcasts e ferramentas com um modelo de negócio por programas de afiliados e
        produtos digitais.
        Entrei para o time como estagiário e era responsável por <b>entender o
        negócio de uma perspectiva de tecnologia e contribuir na criação das
        ferramentas</b>. Criei uma plataforma em Django para gerenciar todos os
        dados e <b>melhorar nossas ferramentas, aumentando a eficiência dos
        times de marketing, comercial e tecnologia</b>, permitindo o negócio
        escalar mais rápido. Desenvolvi fortes habilidades de comunicação já
        que esse trabalho envolvia comunicação constante com o time comercial
        para traduzir a ideia do produto em uma ferramenta amigável ao usuário
        </p>
      pm: |
        <p>
        Edtech financeira brasileira que conecta empresas e pessoas através de cursos, podcasts e ferramentas.
        </p>
        <ul>
            <li>Construí uma plataforma interna em Django para <b>apoiar operações de marketing e comerciais</b>.</li>
            <li><b>Traduzi necessidades de negócio em soluções técnicas</b>, melhorando a eficiência operacional.</li>
            <li><b>Trabalhei próximo a stakeholders não técnicos</b> para entregar ferramentas internas amigáveis ao usuário.</li>
        </ul>

