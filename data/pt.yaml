summary:
  swe: >-
    <b>Engenheiro de Software com habilidades gerais</b> experiente
    em trabalhar com metodologias Agile, responsável por desenvolver e
    manter soluções que dão base às equipes de marketing, business e
    tecnologia, conseguindo antecipar problemas de crescimento,
    necessidades executivas e desenvolver soluções que deêm autonomia a
    todos os times possibilitando maior agilidade nas mudanças e
    crescimento em qualquer parte do projeto. Experiência em Node.Js,
    React, Python, PHP, Java, Javascript, SQL, HTML, CSS, Tailwind, Django,
    Wordpress, C, Git, DevOps, GCP, AWS, AI, MCP, SQL.
  pm: >-
    Profissional orientado a produto com mais de 7 anos de experiência em ambientes de startup, combinando
    sólida profundidade técnica com fluência em negócios. Experiente em liderar escopo de funcionalidades,
    alinhamento de roadmap, colaboração entre times e entregas end-to-end. Background em desenvolvimento
    full-stack possibilita avaliação técnica precisa, priorização realista e comunicação eficaz entre
    times de engenharia, marketing e liderança.

