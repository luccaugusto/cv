experiences:
  roadway:
    company: '<a href="https://roadwayai.com">RoadwayAI</a> através da <a href="https://nacif.xyz">NacifIT</a>'
    date: "Fev 2024 - Presente"
    location: "San Francisco-CA, US (Remoto)"
    titles:
      swe: "Engenheiro de Software Full Stack"
      pm: "Engenheiro Técnico com Foco em Produto"
    descriptions:
      swe: |
        <p>
            A Roadway AI é uma startup de analytics e automação para Growth Marketing, com o propósito de <b>automatizar a metrificação,
            modelagem e análise das métricas que realmente impulsionam o crescimento de empresas em escala</b>.
            Atuando como engenheiro de software full stack (alocado pela NacifIT) em um time enxuto de quatro
            engenheiros, trabalho no <b>desenvolvimento e manutenção de toda a plataforma</b>, abrangendo o Frontend
            (ReactJS) para construção de dashboards, o Backend (Python FastAPI) responsável pela
            orquestração dos dados e gestão dos dashboards, e a modelagem e transformação de dados dos
            clientes utilizando SQL, dbt e uma camada semântica (<a href="https://cube.dev">Cube.dev</a>).
            O projeto possui uma <b>forte camada de Inteligência Artificial</b>, que atua sobre os dados modelados
            para <b>gerar relatórios analíticos detalhados e acionáveis</b>. Destaco como <b>contribuição principal o Attribution Manager</b>,
            desenvolvido majoritariamente por mim, uma ferramenta que permite <b>gerenciar regras complexas de atribuição de
            origem dos usuários com base em UTMs e histórico de navegação</b>.
        </p>
      pm: |
        <p>
            Startup de analytics e automação para growth marketing. Atuando em um time enxuto de quatro
            engenheiros com envolvimento direto no planejamento e entrega de produto.
        </p>
        <ul>
            <li>Defini escopo, priorizei e entregei analises orientadas por IA.</li>
            <li>Liderei o <b>desenvolvimento end-to-end do Attribution Manager</b>, alinhando necessidades de marketing e engenharia, removendo overhead de engenharia e <b>economizando horas de trabalho em cada atualização</b>.</li>
            <li>Contribuí para o <b>planejamento de roadmap e definição de funcionalidades em iterações rápidas</b>.</li>
            <li>Liderei o <b>desenvolvimento end-to-end do login anônimo para demo do app</b>, permitindo que centenas de leads experimentassem o produto em primeira mão, <b>aumentando a confiança do comprador e acelerando a conversão</b>.</li>
            <li>Apoiei a <b>tomada de decisão orientada por dados</b> ao melhorar a lógica de atribuição e workflows de automação.</li>
        </ul>

  sprinter:
    company: '<a href="https://www.sprinterpecas.com.br/">Sprinter Peças</a>'
    date: "Dez 2025 - Jan 2026"
    location: "Belo Horizonte-MG, BR (Remoto)"
    titles:
